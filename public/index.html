<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEM Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>GEM Dashboard</h1>
            <p class="subtitle">Manage your Gemini Gems in one place</p>
        </div>
        <button class="btn btn-primary" id="sync-btn">
            <span class="btn-icon">⟳</span>
            Sync from Gemini
        </button>
    </header>

    <main>
        <div id="gem-container" class="gem-grid"></div>
        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-icon">💎</div>
            <h2>No Gems Found</h2>
            <p>Click "Sync from Gemini" to import your gems, or use the Tampermonkey script.</p>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Edit GEM</h2>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="gem-id">
                <div class="form-group">
                    <label for="gem-name">Name</label>
                    <input type="text" id="gem-name" placeholder="GEM name">
                </div>
                <div class="form-group">
                    <label for="gem-url">URL</label>
                    <input type="url" id="gem-url" placeholder="https://gemini.google.com/gem/...">
                </div>
                <div class="form-group">
                    <label for="gem-description">Description</label>
                    <textarea id="gem-description" placeholder="GEM description"></textarea>
                </div>
                <div class="form-group">
                    <label>Icon</label>
                    <div class="icon-upload">
                        <div id="icon-preview" class="icon-preview">
                            <span class="placeholder-text">No icon</span>
                        </div>
                        <input type="file" id="icon-input" accept="image/*" style="display: none;">
                        <div class="icon-actions">
                            <button type="button" class="btn btn-secondary" id="upload-btn">Upload</button>
                            <button type="button" class="btn btn-danger" id="remove-icon-btn" style="display: none;">Remove</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="save-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
